<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your AstroDig email</title>
</head>
<body bgcolor="#0e0a20" style="margin:0;padding:0;background-color:#0e0a20;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <!-- Outer wrapper - bgcolor is the fallback Gmail respects -->
  <div style="background-color:#0e0a20;padding:40px 20px;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#0e0a20" style="background-color:#0e0a20;">
      <tr>
        <td align="center" bgcolor="#0e0a20" style="background-color:#0e0a20;">
          <!-- Inner card -->
          <table width="480" cellpadding="0" cellspacing="0" border="0" bgcolor="#16122e" style="max-width:480px;width:100%;background-color:#16122e;border:1px solid #3d3256;border-radius:16px;overflow:hidden;">
            <!-- Header -->
            <tr>
              <td bgcolor="#16122e" style="background-color:#16122e;padding:32px 32px 16px;text-align:center;">
                <p style="margin:0;font-size:24px;letter-spacing:0.08em;color:#c9a84c;font-weight:300;">
                  &#10022; AstroDig
                </p>
                <p style="margin:6px 0 0;font-size:12px;letter-spacing:0.15em;color:#6b6480;text-transform:uppercase;">
                  by Jupiter Digital
                </p>
              </td>
            </tr>
            <!-- Body -->
            <tr>
              <td bgcolor="#16122e" style="background-color:#16122e;padding:8px 32px 32px;">
                <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#c4bdd4;text-align:center;">
                  Confirm your email address to finish setting up your AstroDig account.
                </p>
                <!-- CTA Button -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="center" style="padding:8px 0 24px;">
                      <!--[if mso]>
                      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" href="{{ .ConfirmationURL }}" style="height:46px;v-text-anchor:middle;width:200px;" arcsize="17%" fillcolor="#c9a84c">
                        <center style="color:#0e0a20;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:bold;">Confirm Email</center>
                      </v:roundrect>
                      <![endif]-->
                      <!--[if !mso]><!-->
                      <a href="{{ .ConfirmationURL }}"
                         target="_blank"
                         style="display:inline-block;padding:14px 36px;background-color:#c9a84c;color:#0e0a20;font-size:14px;font-weight:600;letter-spacing:0.06em;text-decoration:none;border-radius:8px;mso-hide:all;">
                        Confirm Email
                      </a>
                      <!--<![endif]-->
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:12px;line-height:1.5;color:#6b6480;text-align:center;">
                  If you didn't create an AstroDig account, you can safely ignore this email.
                </p>
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td bgcolor="#120e28" style="background-color:#120e28;padding:16px 32px;border-top:1px solid #2a2445;text-align:center;">
                <p style="margin:0;font-size:11px;color:#4a4563;letter-spacing:0.04em;">
                  astrodig.com &middot; Jupiter Digital
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
