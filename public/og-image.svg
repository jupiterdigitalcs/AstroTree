<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#16103a"/>
      <stop offset="100%" stop-color="#09071a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#09071a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#09071a" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="star-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="310" rx="420" ry="280" fill="url(#glow)"/>

  <!-- Far stars -->
  <g fill="white" opacity="0.35">
    <circle cx="42" cy="18" r="0.8"/><circle cx="118" cy="54" r="0.6"/>
    <circle cx="203" cy="11" r="0.9"/><circle cx="287" cy="73" r="0.7"/>
    <circle cx="356" cy="29" r="0.6"/><circle cx="421" cy="88" r="0.8"/>
    <circle cx="534" cy="17" r="0.7"/><circle cx="698" cy="8" r="0.9"/>
    <circle cx="771" cy="62" r="0.7"/><circle cx="839" cy="22" r="0.8"/>
    <circle cx="923" cy="47" r="0.6"/><circle cx="1007" cy="13" r="0.7"/>
    <circle cx="1089" cy="71" r="0.9"/><circle cx="1158" cy="31" r="0.6"/>
    <circle cx="76" cy="109" r="0.8"/><circle cx="164" cy="141" r="0.6"/>
    <circle cx="1031" cy="103" r="0.8"/><circle cx="1143" cy="128" r="0.6"/>
    <circle cx="67" cy="198" r="0.9"/><circle cx="1050" cy="187" r="0.8"/>
    <circle cx="29" cy="311" r="0.7"/><circle cx="1112" cy="299" r="0.9"/>
    <circle cx="53" cy="412" r="0.6"/><circle cx="1058" cy="428" r="0.7"/>
    <circle cx="78" cy="521" r="0.8"/><circle cx="1003" cy="533" r="0.7"/>
    <circle cx="143" cy="601" r="0.9"/><circle cx="311" cy="614" r="0.6"/>
    <circle cx="889" cy="607" r="0.7"/><circle cx="1057" cy="619" r="0.8"/>
    <circle cx="451" cy="12" r="0.7"/><circle cx="748" cy="19" r="0.8"/>
  </g>

  <!-- Mid stars -->
  <g fill="white" opacity="0.6" filter="url(#star-glow)">
    <circle cx="91" cy="44" r="1.2"/><circle cx="339" cy="61" r="1.1"/>
    <circle cx="861" cy="39" r="1.3"/><circle cx="1109" cy="58" r="1.1"/>
    <circle cx="47" cy="251" r="1.2"/><circle cx="1153" cy="241" r="1.3"/>
    <circle cx="61" cy="489" r="1.1"/><circle cx="1139" cy="481" r="1.2"/>
    <circle cx="274" cy="589" r="1.3"/><circle cx="926" cy="582" r="1.1"/>
    <circle cx="178" cy="168" r="1.1"/><circle cx="1022" cy="162" r="1.2"/>
  </g>

  <!-- Bright stars -->
  <g fill="white" opacity="0.9" filter="url(#star-glow)">
    <circle cx="131" cy="79" r="1.8"/><circle cx="1069" cy="83" r="1.9"/>
    <circle cx="108" cy="551" r="1.7"/><circle cx="1092" cy="548" r="1.8"/>
    <circle cx="372" cy="22" r="2.0"/><circle cx="828" cy="19" r="1.9"/>
    <circle cx="364" cy="607" r="1.8"/><circle cx="836" cy="611" r="2.0"/>
  </g>

  <!-- Gold 4-pointed accent stars -->
  <g stroke="#c9a84c" stroke-width="1.2" opacity="0.7">
    <line x1="71" y1="141" x2="71" y2="151"/><line x1="66" y1="146" x2="76" y2="146"/>
    <line x1="67.5" y1="142.5" x2="74.5" y2="149.5"/><line x1="74.5" y1="142.5" x2="67.5" y2="149.5"/>
    <line x1="1129" y1="141" x2="1129" y2="151"/><line x1="1124" y1="146" x2="1134" y2="146"/>
    <line x1="1125.5" y1="142.5" x2="1132.5" y2="149.5"/><line x1="1132.5" y1="142.5" x2="1125.5" y2="149.5"/>
    <line x1="71" y1="479" x2="71" y2="489"/><line x1="66" y1="484" x2="76" y2="484"/>
    <line x1="67.5" y1="480.5" x2="74.5" y2="487.5"/><line x1="74.5" y1="480.5" x2="67.5" y2="487.5"/>
    <line x1="1129" y1="479" x2="1129" y2="489"/><line x1="1124" y1="484" x2="1134" y2="484"/>
    <line x1="1125.5" y1="480.5" x2="1132.5" y2="487.5"/><line x1="1132.5" y1="480.5" x2="1125.5" y2="487.5"/>
  </g>

  <!-- Constellation tree — connection lines -->
  <g stroke="#c9a84c" stroke-width="1" opacity="0.4" fill="none">
    <line x1="600" y1="520" x2="600" y2="310"/>
    <line x1="600" y1="370" x2="490" y2="290"/>
    <line x1="600" y1="370" x2="710" y2="290"/>
    <line x1="490" y1="290" x2="430" y2="215"/>
    <line x1="490" y1="290" x2="540" y2="210"/>
    <line x1="710" y1="290" x2="660" y2="210"/>
    <line x1="710" y1="290" x2="770" y2="215"/>
    <line x1="430" y1="215" x2="400" y2="155"/>
    <line x1="540" y1="210" x2="560" y2="148"/>
    <line x1="600" y1="310" x2="600" y2="145"/>
    <line x1="660" y1="210" x2="640" y2="148"/>
    <line x1="770" y1="215" x2="800" y2="155"/>
    <line x1="600" y1="520" x2="530" y2="555"/>
    <line x1="600" y1="520" x2="670" y2="555"/>
    <line x1="600" y1="520" x2="600" y2="565"/>
  </g>

  <!-- Constellation tree — nodes -->
  <g fill="#c9a84c" opacity="0.85">
    <circle cx="600" cy="520" r="5"/>
    <circle cx="530" cy="555" r="3"/><circle cx="670" cy="555" r="3"/><circle cx="600" cy="565" r="3"/>
    <circle cx="600" cy="370" r="6"/>
    <circle cx="490" cy="290" r="5"/><circle cx="710" cy="290" r="5"/>
    <circle cx="430" cy="215" r="4.5"/><circle cx="540" cy="210" r="4.5"/>
    <circle cx="660" cy="210" r="4.5"/><circle cx="770" cy="215" r="4.5"/>
    <circle cx="400" cy="155" r="4"/><circle cx="560" cy="148" r="4"/>
    <circle cx="600" cy="145" r="5.5"/>
    <circle cx="640" cy="148" r="4"/><circle cx="800" cy="155" r="4"/>
    <circle cx="600" cy="310" r="3.5"/>
  </g>

  <!-- Apex glow -->
  <circle cx="600" cy="145" r="14" fill="#c9a84c" opacity="0.15"/>
  <circle cx="600" cy="145" r="8" fill="#c9a84c" opacity="0.25"/>

  <!-- Decorative ring at trunk junction -->
  <circle cx="600" cy="370" r="26" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.3"/>
  <circle cx="600" cy="370" r="32" stroke="#c9a84c" stroke-width="0.4" fill="none" opacity="0.15" stroke-dasharray="4 6"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="6" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.35"/>
  <rect x="32" y="32" width="1136" height="566" rx="4" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.18"/>
  <!-- Corner brackets -->
  <g stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.5">
    <polyline points="24,60 24,24 60,24"/>
    <polyline points="1140,24 1176,24 1176,60"/>
    <polyline points="24,570 24,606 60,606"/>
    <polyline points="1140,606 1176,606 1176,570"/>
  </g>

  <!-- Text -->
  <text x="600" y="230"
    font-family="Georgia,'Times New Roman',serif"
    font-size="13" letter-spacing="6"
    fill="#c9a84c" opacity="0.65" text-anchor="middle">JUPITER DIGITAL</text>

  <line x1="480" y1="245" x2="720" y2="245" stroke="#c9a84c" stroke-width="0.7" opacity="0.4"/>
  <circle cx="480" cy="245" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="720" cy="245" r="2" fill="#c9a84c" opacity="0.4"/>

  <text x="600" y="320"
    font-family="Georgia,'Times New Roman',serif"
    font-size="88" font-weight="700" letter-spacing="2"
    fill="#f0e6cc" text-anchor="middle"
    filter="url(#text-glow)">AstroDig</text>

  <text x="600" y="365"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="20" font-weight="300" letter-spacing="5"
    fill="#c9a84c" opacity="0.8" text-anchor="middle">MAP YOUR COSMIC CONNECTIONS</text>

  <text x="600" y="415"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="15" font-weight="300" letter-spacing="2"
    fill="#8b7daa" opacity="0.9" text-anchor="middle">Sun signs, moon signs, compatibility &#x2014; free tool by Jupiter Digital</text>

  <line x1="510" y1="435" x2="690" y2="435" stroke="#c9a84c" stroke-width="0.7" opacity="0.3"/>

  <text x="600" y="470"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="400" letter-spacing="3"
    fill="#c9a84c" opacity="0.5" text-anchor="middle">astrodig.com</text>

  <rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
