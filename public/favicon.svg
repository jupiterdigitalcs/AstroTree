<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle-clip"><circle cx="50" cy="50" r="46"/></clipPath>
    <radialGradient id="planet-grad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8a5fc7"/>
      <stop offset="100%" stop-color="#3a1f6e"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#planet-grad)"/>
  <g clip-path="url(#circle-clip)">
    <rect x="4" y="29" width="92" height="9" fill="#e8c97e" opacity="0.7"/>
    <rect x="4" y="40" width="92" height="5" fill="#2d1855" opacity="0.9"/>
    <rect x="4" y="47" width="92" height="13" fill="#c9a84c" opacity="0.85"/>
    <rect x="4" y="62" width="92" height="6" fill="#2d1855" opacity="0.8"/>
    <rect x="4" y="70" width="92" height="5" fill="#9b7ac4" opacity="0.5"/>
  </g>
  <ellipse cx="62" cy="53" rx="7" ry="4.5" fill="#a06820" opacity="0.7" clip-path="url(#circle-clip)"/>
  <circle cx="50" cy="50" r="46" fill="url(#shine)"/>
  <ellipse cx="50" cy="50" rx="62" ry="10" stroke="#c9a84c" stroke-width="2.5" fill="none" opacity="0.6"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <!-- Constellation apex — signals the "tree" concept -->
  <circle cx="50" cy="6" r="3.5" fill="#c9a84c" opacity="0.9"/>
  <line x1="50" y1="9" x2="42" y2="18" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="9" x2="58" y2="18" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
  <circle cx="42" cy="18" r="2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="58" cy="18" r="2" fill="#c9a84c" opacity="0.6"/>
</svg>
